<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>drive-router · login</title>
<style>
  :root { --bg: #0f1115; --panel: #181b22; --border: #262b35; --text: #e6e8ec; --muted: #8b93a1; --accent: #4f8cff; --red: #f87171; }
  * { box-sizing: border-box; }
  body { margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 36px 32px; width: 340px; text-align: center; }
  h1 { font-size: 18px; margin: 0 0 6px; } h1 span { color: var(--accent); }
  p { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
  input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 11px 14px; color: var(--text); font-size: 15px; margin-bottom: 12px; }
  input:focus { outline: none; border-color: var(--accent); }
  button { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 11px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:hover { opacity: .9; }
  .err { color: var(--red); font-size: 13px; min-height: 18px; margin-top: 10px; }
</style>
</head>
<body>
<div class="card">
  <h1><span>drive</span>-router</h1>
  <p>Masukkan password untuk masuk</p>
  <form id="f">
    <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password" />
    <button type="submit">Masuk</button>
    <div class="err" id="err"></div>
  </form>
</div>
<script>
document.getElementById("f").onsubmit = async (e) => {
  e.preventDefault();
  const password = document.getElementById("pw").value;
  const err = document.getElementById("err");
  err.textContent = "";
  const r = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ password }) });
  if (r.ok) { window.location = "/"; }
  else { err.textContent = "Password salah."; document.getElementById("pw").value = ""; }
};
</script>
</body>
</html>
